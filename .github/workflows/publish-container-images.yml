# Build and publish sockerless container images. Currently pushes to
# ghcr.io/e6qu/<image>; the workflow can later be extended to publish
# to other registries (Docker Hub, GAR, ACR) by adding matrix entries
# or per-registry login steps.
#
# Triggers: tag push (`v*`) and manual `workflow_dispatch`. No
# main-branch auto-publish — every release is gated on a tag.
name: Publish container images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sockerless-bleephub
            dockerfile: bleephub/Dockerfile.release
            context: .
          - image: sockerless-simulator-aws
            dockerfile: simulators/aws/Dockerfile
            context: simulators/aws
          - image: sockerless-simulator-gcp
            dockerfile: simulators/gcp/Dockerfile
            context: simulators/gcp
          - image: sockerless-simulator-azure
            dockerfile: simulators/azure/Dockerfile
            context: simulators/azure
    name: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/e6qu/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
