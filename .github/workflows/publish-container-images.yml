# Build and publish sockerless container images. Currently pushes to
# ghcr.io/e6qu/<image>; the workflow can later be extended to publish
# to other registries (Docker Hub, GAR, ACR) by adding matrix entries
# or per-registry login steps.
#
# Triggers: tag push (`v*`) and manual `workflow_dispatch`. No
# main-branch auto-publish — every release is gated on a tag.
#
# Multi-arch shape: each (image, arch) pair builds + pushes its own
# digest on a NATIVE runner (linux/arm64 → ubuntu-24.04-arm,
# linux/amd64 → ubuntu-latest). A trailing manifest-merge job
# composes both digests into a single multi-arch manifest list. This
# avoids QEMU emulation entirely — every build runs on its target
# CPU architecture.
name: Publish container images

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: sockerless-bleephub, dockerfile: bleephub/Dockerfile.release, context: . }
          - { name: sockerless-simulator-aws, dockerfile: simulators/aws/Dockerfile, context: simulators/aws }
          - { name: sockerless-simulator-gcp, dockerfile: simulators/gcp/Dockerfile, context: simulators/gcp }
          - { name: sockerless-simulator-azure, dockerfile: simulators/azure/Dockerfile, context: simulators/azure }
        arch:
          - { platform: linux/amd64, runner: ubuntu-latest, suffix: amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm, suffix: arm64 }
    name: ${{ matrix.image.name }} (${{ matrix.arch.suffix }})
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (per-arch, by digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.arch.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/e6qu/${{ matrix.image.name }}:${{ github.sha }}-${{ matrix.arch.suffix }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.arch.suffix }}
          cache-to: type=gha,scope=${{ matrix.image.name }}-${{ matrix.arch.suffix }},mode=max

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - sockerless-bleephub
          - sockerless-simulator-aws
          - sockerless-simulator-gcp
          - sockerless-simulator-azure
    name: ${{ matrix.image }} manifest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/e6qu/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Compose multi-arch manifest list
        run: |
          set -euo pipefail
          AMD64_REF="${{ env.REGISTRY }}/e6qu/${{ matrix.image }}:${{ github.sha }}-amd64"
          ARM64_REF="${{ env.REGISTRY }}/e6qu/${{ matrix.image }}:${{ github.sha }}-arm64"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "▸ assembling $tag from $AMD64_REF + $ARM64_REF"
            docker buildx imagetools create \
              --tag "$tag" \
              "$AMD64_REF" \
              "$ARM64_REF"
          done <<< "${{ steps.meta.outputs.tags }}"
