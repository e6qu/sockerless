# live-tests-lambda — sockerless Lambda backend, against a real AWS account.
#
# Manual only (`workflow_dispatch`). Brings up the shared AWS infra
# (terraform; same script as live-tests-ecs — terraform state is
# idempotent), runs the Lambda baseline + runtime-API smokes, and
# tears everything down. Teardown always runs so a failed earlier job
# still releases scratch AWS resources. See smoke-tests/aws-live/README.md
# for the scripts each job runs.
#
# REQUIRED REPOSITORY SECRETS (Settings → Secrets and variables →
# Actions). These MUST be configured before dispatch — the workflow
# will fail at the first credentials step otherwise:
#
#   AWS_LIVE_ROLE_ARN          — IAM role ARN that GitHub OIDC assumes.
#   AWS_LIVE_NGROK_AUTHTOKEN   — (optional) ngrok authtoken used by
#                                3-lambda-runtime-api.sh to publish a
#                                callback URL. Skip if not running
#                                script 3.
#   AWS_LIVE_GITHUB_PAT        — (optional) PAT for the Lambda-targeted
#                                self-hosted runner registration used
#                                by the `hello` job below. Skip if not
#                                running `hello`.
#
# Why repo secrets and not workflow inputs: see live-tests-ecs.yml.

name: live-tests-lambda

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region (e.g. eu-west-1)
        required: true
        default: eu-west-1
      scripts:
        description: 'Comma-separated steps: 0=infra,2=lambda-baseline,3=lambda-runtime-api,4=github-runner,hello,6=teardown ("all" runs the full chain)'
        required: true
        default: "all"

concurrency:
  group: live-tests-lambda
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  infra-up:
    runs-on: ubuntu-latest
    if: contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') || contains(inputs.scripts, '0')
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LIVE_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - uses: hashicorp/setup-terraform@v4
      - run: bash smoke-tests/aws-live/0-infra-up.sh
      - uses: actions/upload-artifact@v7
        with:
          name: ecs-outputs
          path: /tmp/ecs-out.json

  lambda-baseline:
    needs: infra-up
    runs-on: ubuntu-latest
    if: contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') || contains(inputs.scripts, '2')
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LIVE_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - uses: actions/download-artifact@v8
        with: { name: ecs-outputs, path: /tmp }
      - run: (cd backends/lambda && go build -o ../../sockerless-backend-lambda ./cmd/sockerless-backend-lambda)
      - run: bash smoke-tests/aws-live/2-lambda-baseline.sh

  lambda-runtime-api:
    needs: [infra-up, lambda-baseline]
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') ||
      contains(inputs.scripts, '3')
    env:
      AWS_REGION: ${{ inputs.region }}
      NGROK_AUTHTOKEN: ${{ secrets.AWS_LIVE_NGROK_AUTHTOKEN }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          if [ -z "$NGROK_AUTHTOKEN" ]; then
            echo "::warning::ngrok authtoken absent; skipping 3-lambda-runtime-api.sh"
            exit 0
          fi
          bash smoke-tests/aws-live/3-lambda-runtime-api.sh

  github-runner:
    needs: infra-up
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') ||
      contains(inputs.scripts, '4')
    env:
      AWS_REGION: ${{ inputs.region }}
      GITHUB_PAT: ${{ secrets.AWS_LIVE_GITHUB_PAT }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "::warning::github_pat absent; skipping 4-github-runner.sh"
            exit 0
          fi
          bash smoke-tests/aws-live/4-github-runner.sh

  hello:
    # Minimal sanity check that the GH actions/runner + sockerless-lambda
    # backend wiring works end-to-end. Runs on the self-hosted runner
    # spawned by `github-runner` above. No repo secrets used directly —
    # the dispatcher holds the AWS creds + GitHub PAT operator-side.
    needs: github-runner
    if: |
      contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') ||
      contains(inputs.scripts, 'hello')
    runs-on: [self-hosted, sockerless-lambda]
    container:
      image: alpine:latest
    steps:
      - run: echo "hello from sockerless lambda"
      - run: date -u

  teardown:
    needs: [lambda-baseline, lambda-runtime-api, github-runner, hello]
    if: always()
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LIVE_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - uses: hashicorp/setup-terraform@v4
      - run: bash smoke-tests/aws-live/6-teardown.sh
