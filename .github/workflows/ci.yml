name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Install golangci-lint
        run: curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.10.1
      - name: Lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    env:
      # Every backend's TestMain builds+runs its simulator binary, starts
      # the backend process, and exercises real Docker containers pulled
      # from Docker Hub. Ubuntu runners ship with dockerd running, so the
      # integration tests work without extra setup. Set uniformly so no
      # test is silently skipped (per the no-skip principle).
      SOCKERLESS_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Verify docker available
        run: docker version && docker info
      - name: Tests (unit + per-backend integration)
        run: |
          set -e
          # Timeout covers TestMain spawning sim+backend, image pulls, and
          # full arithmetic / lifecycle runs. Fast packages finish early.
          run() { echo "=== $1 ===" && (cd "$1" && go test -tags noui -v -timeout 15m ./...); }
          run_noflags() { echo "=== $1 ===" && (cd "$1" && go test -v -timeout 15m ./...); }
          run_race() { echo "=== $1 ===" && (cd "$1" && go test -v -race -timeout 15m ./...); }
          run_work() { echo "=== $1 ===" && (cd "$1" && GOWORK=off go test -v -timeout 2m ./...); }

          # Architecture checks
          bash scripts/check-cloud-backend-isolation.sh

          # Core + API
          run_noflags api
          run backends/core
          run_race agent

          # Cloud common modules
          run backends/aws-common
          run backends/gcp-common
          run backends/azure-common

          # Cloud backends (with integration tests)
          run backends/ecs
          run backends/lambda
          run backends/cloudrun
          run backends/cloudrun-functions
          run backends/aca
          run backends/azure-functions

          # Services
          run bleephub
          run cmd/sockerless-admin

          # Simulator shared libraries
          run_work simulators/aws/shared
          run_work simulators/gcp/shared
          run_work simulators/azure/shared

  test-e2e:
    runs-on: ubuntu-latest
    name: test (e2e)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Run tests
        run: cd tests && go test -v -timeout 5m ./...

  sim:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, gcp, azure]
    name: sim (${{ matrix.cloud }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Install gcloud CLI
        if: matrix.cloud == 'gcp'
        run: |
          curl -sSL https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz | tar -xz -C $HOME
          echo "$HOME/google-cloud-sdk/bin" >> $GITHUB_PATH
      - name: Install Azure CLI
        if: matrix.cloud == 'azure'
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      - name: Run SDK tests
        run: cd simulators/${{ matrix.cloud }} && make sdk-test
        timeout-minutes: 5
        env:
          GOWORK: "off"
      - name: Run CLI tests
        run: cd simulators/${{ matrix.cloud }} && make cli-test
        timeout-minutes: 5
        env:
          GOWORK: "off"

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'
      - run: cd ui && bun install --frozen-lockfile
      - run: cd ui && bunx turbo run build
      - run: cd ui && bunx turbo run test

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Check backend api.Backend coverage
        run: cd tools/check-backend-coverage && GOWORK=off go run . --enforce
      - name: Build all binaries (amd64)
        env:
          GOWORK: "off"
        run: |
          set -e
          build() { echo "=== $1 ===" && (cd "$1" && go build -o /dev/null "$2"); }
          noui() { echo "=== $1 (noui) ===" && (cd "$1" && go build -tags noui -o /dev/null "$2"); }
          noui bleephub ./cmd
          build cmd/sockerless .
          build agent ./cmd/sockerless-agent
          noui backends/ecs ./cmd/sockerless-backend-ecs
          noui backends/lambda ./cmd/sockerless-backend-lambda
          noui backends/cloudrun ./cmd/sockerless-backend-cloudrun
          noui backends/cloudrun-functions ./cmd/sockerless-backend-gcf
          noui backends/aca ./cmd/sockerless-backend-aca
          noui backends/azure-functions ./cmd/sockerless-backend-azf
          noui backends/docker ./cmd
          noui simulators/aws .
          noui simulators/gcp .
          noui simulators/azure .
          noui cmd/sockerless-admin .
          build github-runner-dispatcher-aws ./cmd/github-runner-dispatcher-aws
          build github-runner-dispatcher-gcp ./cmd/github-runner-dispatcher-gcp
          build github-runner-dispatcher-azure ./cmd/github-runner-dispatcher-azure
      - name: Cross-compile all binaries (arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
          GOWORK: "off"
        run: |
          set -e
          build() { echo "=== $1 ===" && (cd "$1" && go build -o /dev/null "$2"); }
          noui() { echo "=== $1 (noui) ===" && (cd "$1" && go build -tags noui -o /dev/null "$2"); }
          noui bleephub ./cmd
          build cmd/sockerless .
          build agent ./cmd/sockerless-agent
          noui backends/ecs ./cmd/sockerless-backend-ecs
          noui backends/lambda ./cmd/sockerless-backend-lambda
          noui backends/cloudrun ./cmd/sockerless-backend-cloudrun
          noui backends/cloudrun-functions ./cmd/sockerless-backend-gcf
          noui backends/aca ./cmd/sockerless-backend-aca
          noui backends/azure-functions ./cmd/sockerless-backend-azf
          noui backends/docker ./cmd
          noui simulators/aws .
          noui simulators/gcp .
          noui simulators/azure .
          noui cmd/sockerless-admin .
          build github-runner-dispatcher-aws ./cmd/github-runner-dispatcher-aws
          build github-runner-dispatcher-gcp ./cmd/github-runner-dispatcher-gcp
          build github-runner-dispatcher-azure ./cmd/github-runner-dispatcher-azure

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Smoke test (ecs)
        run: |
          docker build -t smoke-ecs -f smoke-tests/Dockerfile.ecs .
          docker run --rm --security-opt label=disable -v /var/run/docker.sock:/var/run/docker.sock smoke-ecs
        timeout-minutes: 10
      - name: Smoke test (cloudrun)
        run: |
          docker build -t smoke-cloudrun -f smoke-tests/Dockerfile.cloudrun .
          docker run --rm --security-opt label=disable -v /var/run/docker.sock:/var/run/docker.sock smoke-cloudrun
        timeout-minutes: 10
      - name: Smoke test (aca)
        run: |
          docker build -t smoke-aca -f smoke-tests/Dockerfile.aca .
          docker run --rm --security-opt label=disable -v /var/run/docker.sock:/var/run/docker.sock smoke-aca
        timeout-minutes: 10

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: hashicorp/setup-terraform@v4
      - name: Run terraform tests
        run: |
          cd terraform/modules/ecs/test
          GOWORK=off go test -v -timeout 10m ./...
        timeout-minutes: 10
