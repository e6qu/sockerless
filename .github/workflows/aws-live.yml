name: AWS live

# Workflow-dispatch only — triggered manually when live-AWS validation
# is needed. Teardown always runs so a failed earlier job still
# releases scratch AWS resources. See smoke-tests/aws-live/README.md
# for the scripts each job runs.
#
# REQUIRED REPOSITORY SECRETS (Settings → Secrets and variables →
# Actions). These MUST be configured before dispatch — the workflow
# will fail at the first credentials step otherwise:
#
#   AWS_LIVE_ROLE_ARN          — IAM role ARN that GitHub OIDC assumes.
#                                 Trust policy allows
#                                 token.actions.githubusercontent.com
#                                 with this repo's ref claim.
#   AWS_LIVE_GITHUB_PAT         — (optional) PAT for 4-github-runner.sh
#                                 self-hosted-runner registration.
#                                 Skip if not running script 4.
#   AWS_LIVE_GITLAB_RUNNER_TOKEN — (optional) GitLab runner registration
#                                 token for 5-gitlab-runner.sh. Skip if
#                                 not running script 5.
#   AWS_LIVE_NGROK_AUTHTOKEN    — (optional) ngrok authtoken used by
#                                 3-lambda-runtime-api.sh to publish a
#                                 callback URL. Skip if not running
#                                 script 3.
#
# Why repo secrets and not workflow inputs: GitHub Actions
# workflow_dispatch inputs leak into the run history's Inputs panel
# and the workflow run REST API, so they're not safe for credentials.
# Repo secrets are masked in logs and never returned by the API.
# Mirror the same secret names in the GitLab mirror's CI/CD variables
# if running this workflow there.

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region (e.g. eu-west-1)
        required: true
        default: eu-west-1
      scripts:
        description: Comma-separated script numbers to run (e.g. "0,1,2,6" or "all")
        required: true
        default: "all"

concurrency:
  group: aws-live
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  infra-up:
    runs-on: ubuntu-latest
    if: contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') || contains(inputs.scripts, '0')
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LIVE_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - uses: hashicorp/setup-terraform@v4
      - run: bash smoke-tests/aws-live/0-infra-up.sh
      - uses: actions/upload-artifact@v7
        with:
          name: ecs-outputs
          path: /tmp/ecs-out.json

  ecs-smoke:
    needs: infra-up
    runs-on: ubuntu-latest
    if: contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') || contains(inputs.scripts, '1')
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LIVE_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - uses: actions/download-artifact@v8
        with: { name: ecs-outputs, path: /tmp }
      - run: (cd backends/ecs && go build -o ../../sockerless-backend-ecs ./cmd/sockerless-backend-ecs)
      - run: bash smoke-tests/aws-live/1-ecs-smoke.sh

  lambda-baseline:
    needs: infra-up
    runs-on: ubuntu-latest
    if: contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') || contains(inputs.scripts, '2')
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LIVE_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - uses: actions/download-artifact@v8
        with: { name: ecs-outputs, path: /tmp }
      - run: (cd backends/lambda && go build -o ../../sockerless-backend-lambda ./cmd/sockerless-backend-lambda)
      - run: bash smoke-tests/aws-live/2-lambda-baseline.sh

  lambda-runtime-api:
    needs: [infra-up, lambda-baseline]
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') ||
      contains(inputs.scripts, '3')
    env:
      AWS_REGION: ${{ inputs.region }}
      NGROK_AUTHTOKEN: ${{ secrets.AWS_LIVE_NGROK_AUTHTOKEN }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          if [ -z "$NGROK_AUTHTOKEN" ]; then
            echo "::warning::ngrok authtoken absent; skipping 3-lambda-runtime-api.sh"
            exit 0
          fi
          bash smoke-tests/aws-live/3-lambda-runtime-api.sh

  github-runner:
    needs: infra-up
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') ||
      contains(inputs.scripts, '4')
    env:
      AWS_REGION: ${{ inputs.region }}
      GITHUB_PAT: ${{ secrets.AWS_LIVE_GITHUB_PAT }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          if [ -z "$GITHUB_PAT" ]; then
            echo "::warning::github_pat absent; skipping 4-github-runner.sh"
            exit 0
          fi
          bash smoke-tests/aws-live/4-github-runner.sh

  gitlab-runner:
    needs: infra-up
    runs-on: ubuntu-latest
    if: |
      contains(fromJSON(format('["all","{0}"]', inputs.scripts)), 'all') ||
      contains(inputs.scripts, '5')
    env:
      AWS_REGION: ${{ inputs.region }}
      GITLAB_RUNNER_TOKEN: ${{ secrets.AWS_LIVE_GITLAB_RUNNER_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          if [ -z "$GITLAB_RUNNER_TOKEN" ]; then
            echo "::warning::gitlab_runner_token absent; skipping 5-gitlab-runner.sh"
            exit 0
          fi
          bash smoke-tests/aws-live/5-gitlab-runner.sh

  teardown:
    needs: [ecs-smoke, lambda-baseline, lambda-runtime-api, github-runner, gitlab-runner]
    if: always()
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.region }}
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LIVE_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - uses: hashicorp/setup-terraform@v4
      - run: bash smoke-tests/aws-live/6-teardown.sh
