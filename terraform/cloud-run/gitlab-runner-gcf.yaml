# gitlab-runner gcf cell — multi-container Cloud Run Service.
#
# Mirrors gitlab-runner-cloudrun.yaml for cell 8: same vanilla 3-container
# shape (init + gitlab-runner + sockerless), differing only in the
# sockerless sidecar (sockerless-backend-gcf instead of cloudrun) and
# its DOCKER_HOST port (3376 instead of 3375).
#
# Apply via:
#   gcloud run services replace terraform/cloud-run/gitlab-runner-gcf.yaml \
#     --project=sockerless-live-46x3zg4imo --region=us-central1
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gitlab-runner-gcf
  annotations:
    run.googleapis.com/ingress: internal
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/vpc-access-connector: projects/sockerless-live-46x3zg4imo/locations/us-central1/connectors/sockerless-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/container-dependencies: '{"gitlab-runner":["init"]}'
    spec:
      serviceAccountName: sockerless-runner@sockerless-live-46x3zg4imo.iam.gserviceaccount.com
      containers:
        - name: init
          image: us-central1-docker.pkg.dev/sockerless-live-46x3zg4imo/sockerless-live/gitlab-runner-init@sha256:9bc95f69caa84f02bf4c58361b9ff131f5664d1fe972c32563b5c8cc3a2ab2ed
          env:
            - name: GITLAB_URL
              value: "https://gitlab.com"
            - name: GITLAB_PROJECT_ID
              value: "81023556"
            - name: RUNNER_NAME_PREFIX
              value: "sockerless-gcf"
            - name: RUNNER_TAGS
              value: "sockerless-gcf"
            - name: SOCKERLESS_PORT
              value: ":3376"
            - name: SHARED_CONFIG_PATH
              value: "/shared/config.toml"
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitlab-pat
                  key: latest
          volumeMounts:
            - name: shared-config
              mountPath: /shared
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 8081
            failureThreshold: 60
            periodSeconds: 1
        - name: gitlab-runner
          image: gitlab/gitlab-runner:v17.5.0
          args:
            - "run"
            - "--config"
            - "/shared/config.toml"
          env:
            - name: DOCKER_HOST
              value: "tcp://localhost:3376"
          volumeMounts:
            - name: shared-config
              mountPath: /shared
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
        - name: sockerless
          image: us-central1-docker.pkg.dev/sockerless-live-46x3zg4imo/sockerless-live/sockerless-backend-gcf@sha256:c559d6792803865b61874db0b751e343a1d44c9268ee250d1356777146b53c6d
          ports:
            - containerPort: 3376
          env:
            - name: SOCKERLESS_GCF_PROJECT
              value: "sockerless-live-46x3zg4imo"
            - name: SOCKERLESS_GCF_REGION
              value: "us-central1"
            - name: SOCKERLESS_GCP_BUILD_BUCKET
              value: "sockerless-live-46x3zg4imo-build"
            - name: SOCKERLESS_GCP_SHARED_VOLUMES
              value: "runner-workspace=/tmp/runner-work=sockerless-live-46x3zg4imo-runner-workspace"
            - name: SOCKERLESS_GCF_BOOTSTRAP
              value: "/opt/sockerless/sockerless-gcf-bootstrap"
            # BUG-948: pre-deploy free Functions for the gitlab-runner cache
            # -permission overlay so first ContainerCreate hits a warm pool
            # instead of paying the regional CPU quota cost of a fresh
            # deploy. Image is the gitlab-runner-helper used by the docker
            # executor (cell 7 + cell 8 trace evidence). Size 3 covers
            # gitlab-runner's typical concurrent-permission-container burst.
            - name: SOCKERLESS_GCF_PREWARM_OVERLAYS
              value: "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-v17.5.0:3"
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: shared-config
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
