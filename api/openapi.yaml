# ════════════════════════════════════════════════════════════════════════
# Components — Types
# ════════════════════════════════════════════════════════════════════════

components:
  schemas:

    # ── Container Inspect ────────────────────────────────────────────

    Container:
      type: object
      x-sockerless-docker-name: ContainerJSON
      x-sockerless-extensions: [AgentAddress, AgentToken]
      properties:
        Id:
          type: string
        Name:
          type: string
        Created:
          type: string
        Path:
          type: string
        Args:
          type: array
          items: { type: string }
        State:
          $ref: "#/components/schemas/ContainerState"
        Image:
          type: string
        Config:
          $ref: "#/components/schemas/ContainerConfig"
        HostConfig:
          $ref: "#/components/schemas/HostConfig"
        NetworkSettings:
          $ref: "#/components/schemas/NetworkSettings"
        Mounts:
          type: array
          items:
            $ref: "#/components/schemas/MountPoint"
        Platform:
          type: string
        Driver:
          type: string
        RestartCount:
          type: integer
        LogPath:
          type: string
        ResolvConfPath:
          type: string
        HostnamePath:
          type: string
        HostsPath:
          type: string
        ExecIDs:
          type: array
          items: { type: string }
        SizeRw:
          type: integer
          format: int64
          x-sockerless-go-pointer: true
        SizeRootFs:
          type: integer
          format: int64
          x-sockerless-go-pointer: true
        AgentAddress:
          type: string
        AgentToken:
          type: string

    ContainerState:
      type: object
      x-sockerless-docker-name: ContainerState
      properties:
        Status:
          type: string
        Running:
          type: boolean
        Paused:
          type: boolean
        Restarting:
          type: boolean
        OOMKilled:
          type: boolean
        Dead:
          type: boolean
        Pid:
          type: integer
        ExitCode:
          type: integer
        Error:
          type: string
        StartedAt:
          type: string
        FinishedAt:
          type: string
        Health:
          x-sockerless-go-pointer: true
          $ref: "#/components/schemas/HealthState"

    ContainerConfig:
      type: object
      x-sockerless-docker-name: ContainerConfig
      properties:
        Hostname:
          type: string
        Domainname:
          type: string
        User:
          type: string
        AttachStdin:
          type: boolean
        AttachStdout:
          type: boolean
        AttachStderr:
          type: boolean
        ExposedPorts:
          type: object
          additionalProperties:
            type: object
          x-sockerless-go-type: "map[string]struct{}"
        Tty:
          type: boolean
        OpenStdin:
          type: boolean
        StdinOnce:
          type: boolean
        Env:
          type: array
          items: { type: string }
        Cmd:
          type: array
          items: { type: string }
        Image:
          type: string
        Volumes:
          type: object
          additionalProperties:
            type: object
          x-sockerless-go-type: "map[string]struct{}"
        WorkingDir:
          type: string
        Entrypoint:
          type: array
          items: { type: string }
        Labels:
          type: object
          additionalProperties: { type: string }
        StopSignal:
          type: string
        StopTimeout:
          type: integer
          x-sockerless-go-pointer: true
        Shell:
          type: array
          items: { type: string }
        Healthcheck:
          x-sockerless-go-pointer: true
          $ref: "#/components/schemas/HealthcheckConfig"
        ArgsEscaped:
          type: boolean
        NetworkDisabled:
          type: boolean
        MacAddress:
          type: string
        OnBuild:
          type: array
          items: { type: string }

    HostConfig:
      type: object
      x-sockerless-docker-name: HostConfig
      properties:
        NetworkMode:
          type: string
        Binds:
          type: array
          items: { type: string }
        AutoRemove:
          type: boolean
        PortBindings:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/PortBinding"
        RestartPolicy:
          $ref: "#/components/schemas/RestartPolicy"
        Privileged:
          type: boolean
        CapAdd:
          type: array
          items: { type: string }
        CapDrop:
          type: array
          items: { type: string }
        Init:
          type: boolean
          x-sockerless-go-pointer: true
        UsernsMode:
          type: string
        ShmSize:
          type: integer
          format: int64
        Tmpfs:
          type: object
          additionalProperties: { type: string }
        SecurityOpt:
          type: array
          items: { type: string }
        LogConfig:
          $ref: "#/components/schemas/LogConfig"
        ExtraHosts:
          type: array
          items: { type: string }
        Mounts:
          type: array
          items:
            $ref: "#/components/schemas/Mount"
        Isolation:
          type: string
        Dns:
          type: array
          items: { type: string }
          x-sockerless-json-tag: Dns
        DnsSearch:
          type: array
          items: { type: string }
          x-sockerless-json-tag: DnsSearch
        DnsOptions:
          type: array
          items: { type: string }
          x-sockerless-json-tag: DnsOptions
        Memory:
          type: integer
          format: int64
        MemorySwap:
          type: integer
          format: int64
        MemoryReservation:
          type: integer
          format: int64
        CpuShares:
          type: integer
          format: int64
          x-sockerless-json-tag: CpuShares
        CpuQuota:
          type: integer
          format: int64
          x-sockerless-json-tag: CpuQuota
        CpuPeriod:
          type: integer
          format: int64
          x-sockerless-json-tag: CpuPeriod
        CpusetCpus:
          type: string
        NanoCpus:
          type: integer
          format: int64
          x-sockerless-json-tag: NanoCpus
        CpusetMems:
          type: string
        BlkioWeight:
          type: integer
          x-sockerless-go-type: uint16
        PidMode:
          type: string
        IpcMode:
          type: string
        UTSMode:
          type: string
        VolumesFrom:
          type: array
          items: { type: string }
        GroupAdd:
          type: array
          items: { type: string }
        ReadonlyRootfs:
          type: boolean
        OomKillDisable:
          type: boolean
          x-sockerless-go-pointer: true
        PidsLimit:
          type: integer
          format: int64
          x-sockerless-go-pointer: true
        Sysctls:
          type: object
          additionalProperties: { type: string }
        Runtime:
          type: string
        Links:
          type: array
          items: { type: string }
        PublishAllPorts:
          type: boolean
        CgroupnsMode:
          type: string
        ConsoleSize:
          type: array
          items: { type: integer }
          x-sockerless-go-type: "[2]uint"

    PortBinding:
      type: object
      x-sockerless-docker-name: PortBinding
      properties:
        HostIp:
          type: string
        HostPort:
          type: string

    RestartPolicy:
      type: object
      x-sockerless-docker-name: RestartPolicy
      properties:
        Name:
          type: string
        MaximumRetryCount:
          type: integer

    LogConfig:
      type: object
      x-sockerless-docker-name: LogConfig
      properties:
        Type:
          type: string
        Config:
          type: object
          additionalProperties: { type: string }

    Mount:
      type: object
      x-sockerless-docker-name: Mount
      properties:
        Type:
          type: string
        Source:
          type: string
        Target:
          type: string
        ReadOnly:
          type: boolean
        Consistency:
          type: string
        BindOptions:
          x-sockerless-go-pointer: true
          $ref: "#/components/schemas/BindOptions"
        VolumeOptions:
          x-sockerless-go-pointer: true
          $ref: "#/components/schemas/VolumeOptions"
        TmpfsOptions:
          x-sockerless-go-pointer: true
          $ref: "#/components/schemas/TmpfsOptions"

    BindOptions:
      type: object
      x-sockerless-docker-name: BindOptions
      properties:
        Propagation:
          type: string

    VolumeOptions:
      type: object
      x-sockerless-docker-name: VolumeOptions
      properties:
        NoCopy:
          type: boolean
        Labels:
          type: object
          additionalProperties: { type: string }
        DriverConfig:
          x-sockerless-go-pointer: true
          $ref: "#/components/schemas/VolumeDriverConfig"

    VolumeDriverConfig:
      type: object
      x-sockerless-docker-name: DriverConfig
      properties:
        Name:
          type: string
        Options:
          type: object
          additionalProperties: { type: string }

    TmpfsOptions:
      type: object
      x-sockerless-docker-name: TmpfsOptions
      properties:
        SizeBytes:
          type: integer
          format: int64
        Mode:
          type: integer
          x-sockerless-go-type: uint32

    # ── Network Settings ─────────────────────────────────────────────

    NetworkSettings:
      type: object
      x-sockerless-docker-name: NetworkSettings
      properties:
        Bridge:
          type: string
        SandboxID:
          type: string
        HairpinMode:
          type: boolean
        LinkLocalIPv6Address:
          type: string
        LinkLocalIPv6PrefixLen:
          type: integer
        SandboxKey:
          type: string
        Gateway:
          type: string
        IPAddress:
          type: string
        IPPrefixLen:
          type: integer
        MacAddress:
          type: string
        EndpointID:
          type: string
        GlobalIPv6Address:
          type: string
        GlobalIPv6PrefixLen:
          type: integer
        IPv6Gateway:
          type: string
        Networks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/EndpointSettings"
          x-sockerless-go-type: "map[string]*EndpointSettings"
        Ports:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/PortBinding"

    EndpointSettings:
      type: object
      x-sockerless-docker-name: EndpointSettings
      properties:
        IPAMConfig:
          x-sockerless-go-pointer: true
          $ref: "#/components/schemas/EndpointIPAMConfig"
        NetworkID:
          type: string
        EndpointID:
          type: string
        Gateway:
          type: string
        IPAddress:
          type: string
        IPPrefixLen:
          type: integer
        IPv6Gateway:
          type: string
        GlobalIPv6Address:
          type: string
        GlobalIPv6PrefixLen:
          type: integer
        MacAddress:
          type: string
        Aliases:
          type: array
          items: { type: string }
        Links:
          type: array
          items: { type: string }
        DNSNames:
          type: array
          items: { type: string }
        DriverOpts:
          type: object
          additionalProperties: { type: string }

    EndpointIPAMConfig:
      type: object
      x-sockerless-docker-name: EndpointIPAMConfig
      properties:
        IPv4Address:
          type: string
        IPv6Address:
          type: string
        LinkLocalIPs:
          type: array
          items: { type: string }

    MountPoint:
      type: object
      x-sockerless-docker-name: MountPoint
      properties:
        Type:
          type: string
        Name:
          type: string
        Source:
          type: string
        Destination:
          type: string
        Driver:
          type: string
        Mode:
          type: string
        RW:
          type: boolean
        Propagation:
          type: string

    # ── Container List ───────────────────────────────────────────────

    ContainerSummary:
      type: object
      x-sockerless-docker-name: ContainerSummary
      properties:
        Id:
          type: string
        Names:
          type: array
          items: { type: string }
        Image:
          type: string
