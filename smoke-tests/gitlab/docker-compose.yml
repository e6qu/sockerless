services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab'
        gitlab_rails['initial_root_password'] = 'sockerless-test-pw'
        puma['worker_processes'] = 0
        sidekiq['concurrency'] = 2
        prometheus_monitoring['enable'] = false
        gitlab_rails['monitoring_whitelist'] = ['0.0.0.0/0']
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/-/readiness"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    shm_size: 256m

  sockerless-backend:
    build:
      context: ../..
      dockerfile: smoke-tests/gitlab/Dockerfile.backend
    command: []
    environment:
      CLOUD: aws
      BACKEND_ADDR: ":2375"

  orchestrator:
    build:
      context: ../..
      dockerfile: smoke-tests/gitlab/Dockerfile.orchestrator
    environment:
      GITLAB_URL: http://gitlab
      GITLAB_ROOT_PASSWORD: sockerless-test-pw
      SOCKERLESS_HOST: tcp://sockerless-backend:2375
      GITLAB_TIMEOUT: "600"
      PIPELINE_TIMEOUT: "300"
    depends_on:
      - gitlab
      - sockerless-backend
